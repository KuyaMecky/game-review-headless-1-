server
{
    listen 80;
    listen 443 ssl http2 ;
    server_name pagcorcasino.ph;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/pagcorcasino.ph;
    include /www/server/panel/vhost/nginx/extension/pagcorcasino.ph/*.conf;

    #SSL-START SSL related configuration, do NOT delete or modify the next line of commented-out 404 rules
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/pagcorcasino.ph/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/pagcorcasino.ph/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START  Error page configuration, allowed to be commented, deleted or modified
    error_page 404 /404.html;
    error_page 502 /502.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  PHP reference configuration, allowed to be commented, deleted or modified
    include enable-php-83-wpfastcgi.conf;
    #PHP-INFO-END

    # Forbidden files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    # Directory verification related settings for one-click application for SSL certificate
    location ~ \.well-known{
        allow all;
    }

    #Prohibit putting sensitive files in certificate verification directory
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # WordPress admin redirect
    rewrite /wp-admin$ $scheme://$host$uri/ permanent;

    # WordPress paths - serve from WordPress root
    location /wp-admin/ {
        try_files $uri $uri/ /wp-admin/index.php?$args;
    }

    location /wp-includes/ {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location /wp-content/ {
        expires 30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    # WordPress API endpoints
    location /wp-json/ {
        try_files $uri $uri/ /index.php?$args;
    }

    location /graphql {
        try_files $uri $uri/ /index.php?$args;
    }

    location /xmlrpc.php {
        deny all;
    }

    # Next.js static files
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        access_log off;
    }

    # Next.js frontend - default for all other paths
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log  /www/wwwlogs/pagcorcasino.ph.log;
    error_log  /www/wwwlogs/pagcorcasino.ph.error.log;
}
